name: verify all implementations

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      # --- language runtimes (cross-platform) ---

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: setup swift (linux only — pre-installed on macos, n/a on windows)
        uses: swift-actions/setup-swift@v2
        if: runner.os == 'Linux'

      - name: install ts-node
        run: npm install -g ts-node typescript

      - name: install kotlin
        env:
          KOTLIN_VERSION: '2.0.21'
        run: |
          curl -fsSL "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip" -o kotlin.zip
          unzip -q kotlin.zip -d "$RUNNER_TEMP/kotlin"
          echo "$RUNNER_TEMP/kotlin/kotlinc/bin" >> "$GITHUB_PATH"

      # --- os-specific package installs ---

      - name: install tools (ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gfortran gnat swi-prolog lua5.4 php-cli octave file ksh wget apt-transport-https software-properties-common
          sudo ln -sf /usr/bin/lua5.4 /usr/local/bin/lua
          # Install Powershell
          source /etc/os-release
          wget -q https://packages.microsoft.com/config/ubuntu/$VERSION_ID/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update -qq
          sudo apt-get install -y powershell
          # Install YottaDB (MUMPS)
          mkdir /tmp/ydb && cd /tmp/ydb
          wget https://gitlab.com/YottaDB/DB/YDB/raw/master/sr_unix/ydbinstall.sh
          chmod +x ydbinstall.sh
          sudo ./ydbinstall.sh --utf8 default
          # Find the installation directory (e.g., /usr/local/lib/yottadb/r206)
          YDB_DIR=$(ls -d /usr/local/lib/yottadb/r* | head -n 1)
          sudo ln -sf "$YDB_DIR/mumps" /usr/local/bin/mumps
          sudo ln -sf "$YDB_DIR/yottadb" /usr/local/bin/yottadb

      - name: install tools (macos)
        if: runner.os == 'macOS'
        run: |
          brew install lua swi-prolog gcc php
          # gcc provides versioned gfortran (e.g. gfortran-14) — create bare symlink
          gf=$(ls /opt/homebrew/bin/gfortran-* 2>/dev/null | sort -V | tail -1)
          if [[ -n "$gf" ]]; then ln -sf "$gf" /opt/homebrew/bin/gfortran; fi
          # php was removed from macOS 12+; swiftc/ksh/perl are pre-installed
          # gnat excluded: arm64 homebrew support uncertain

      - name: install tools (windows)
        if: runner.os == 'Windows'
        run: |
          # gcc/g++/gfortran from mingw64 (pre-installed); php pre-installed on runner
          # choco shims don't reliably surface in git bash — use MSYS2 mingw64 packages
          /c/msys64/usr/bin/pacman.exe -Sy --noconfirm mingw-w64-x86_64-lua mingw-w64-x86_64-swi-prolog
          echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"
          # gnat not available — ada test will be skipped on windows

      # --- declare which langs must pass (skip = failure for these) ---

      - name: set required langs (ubuntu)
        if: runner.os == 'Linux'
        run: |
          echo "MUST_RUN=c,c++,fortran,ada,rust,swift,haskell,java,kotlin,go,node.js,typescript,python,ruby,perl,php,lua,c#,bash/awk,ksh,powershell,prolog,octave" >> "$GITHUB_ENV"

      - name: set required langs (macos)
        if: runner.os == 'macOS'
        run: |
          # ksh is pre-installed on macos runners; ada/mumps/octave excluded
          echo "MUST_RUN=c,c++,fortran,rust,swift,haskell,java,kotlin,go,node.js,typescript,python,ruby,perl,php,lua,c#,bash/awk,ksh,powershell,prolog" >> "$GITHUB_ENV"

      - name: set required langs (windows)
        if: runner.os == 'Windows'
        run: |
          # swift/ada/ksh/mumps: not available on windows — genuinely excluded
          echo "MUST_RUN=c,c++,fortran,rust,haskell,java,kotlin,go,node.js,typescript,python,ruby,perl,php,lua,c#,bash/awk,powershell,prolog" >> "$GITHUB_ENV"

      # --- run it ---

      - name: run tests
        run: bash test.sh
